<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard – AKURE</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <link rel="stylesheet" href="/css/global.css?v=1776093859185" />
  <link rel="stylesheet" href="/css/components.css" />
  <!-- Env config injected by server -->
  <script>window.__AKURE_ENV__ = { SUPABASE_URL: 'https://ldlxruqfqgvvclwwjfgh.supabase.co', SUPABASE_ANON: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkbHhydXFmcWd2dmNsd3dqZmdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzAzMDUsImV4cCI6MjA5MTYwNjMwNX0.iWLX17xU153PxozUAQ2ZpvfzCzrzSnrfOsCNYCm8-JY' };</script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* Admin specific styles */
    .admin-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .admin-sidebar {
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      padding: 2rem;
    }
    .admin-content {
      padding: 2rem 4rem;
      background: var(--color-bg);
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .admin-card {
      background: #fff;
      padding: 2rem;
      border-radius: var(--radius-lg);
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-bottom: 2rem;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
    }
    .admin-table th, .admin-table td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--color-border);
    }
    .admin-table th {
      font-weight: 600;
      color: var(--color-text-muted);
    }
    .admin-table tbody tr:hover {
      background: #faf9f6;
    }
    .action-btns {
      display: flex;
      gap: 0.5rem;
    }
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-container {
      background: #fff;
      padding: 2rem;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .modal-container {
      transform: translateY(0);
    }
    
    @media (max-width: 768px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar { display: none; }
      .admin-content { padding: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Page Loader -->
  <div id="page-loader" aria-hidden="true">
    <div class="loader-logo">AKURE</div>
    <div class="loader-bar"></div>
  </div>

  <div class="admin-layout" id="admin-dashboard" style="display:none;">
    <aside class="admin-sidebar">
      <a href="/" class="navbar__logo" style="display:flex; align-items:center;"><img src="/images/logo-bg.png" alt="AKURE" style="height: 48px; width: auto; transform: scale(3.5); transform-origin: left center;" /></a>
      <p style="margin-top:0.5rem;font-size:0.8rem;color:var(--color-text-muted);">Admin Dashboard</p>
      
      <nav style="margin-top: 3rem; display: flex; flex-direction: column; gap: 1rem;">
        <a href="#products" class="btn btn--outline btn--full text-left" style="border-color:var(--color-gold);color:var(--color-dark);">Products</a>
        <a href="/" class="btn btn--ghost btn--full text-left">View Website</a>
        <button onclick="AKURE.logout()" class="btn btn--ghost btn--full text-left" style="color:var(--color-error);margin-top:auto;">Log Out</button>
      </nav>
    </aside>

    <main class="admin-content">
      <header class="admin-header">
        <div>
          <h1 style="font-family:var(--font-heading);font-weight:700;">Products Management</h1>
          <p class="text-muted" id="stats-total">Loading...</p>
        </div>
        <button class="btn btn--gold" onclick="openProductModal()">+ Add Product</button>
      </header>

      <div class="admin-card">
        <div style="overflow-x:auto;">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admin-product-list">
              <!-- Rendered via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal-container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <h2 id="modal-title">Add Product</h2>
        <button onclick="closeProductModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">&times;</button>
      </div>
      
      <form id="product-form">
        <input type="hidden" id="product-id">
        
        <div class="form-group mb-4">
          <label for="product-name">Product Name *</label>
          <input type="text" id="product-name" class="form-control" required>
        </div>
        
        <div class="form-group mb-4">
          <label for="product-desc">Description</label>
          <textarea id="product-desc" class="form-control" rows="3"></textarea>
        </div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;" class="mb-4">
          <div class="form-group">
            <label for="product-price">Price (₹) *</label>
            <input type="number" id="product-price" class="form-control" required min="0">
          </div>
          <div class="form-group">
            <label for="product-stock">Stock *</label>
            <input type="number" id="product-stock" class="form-control" required min="0">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;" class="mb-4">
          <div class="form-group">
            <label for="product-category">Category *</label>
            <select id="product-category" class="form-control" required>
              <option value="oils">Oils</option>
              <option value="honey">Honey</option>
              <option value="herbs">Herbs</option>
              <option value="skincare">Skincare</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:center;margin-top:1.5rem;">
            <input type="checkbox" id="product-limited" style="margin-right:0.5rem;width:1.2rem;height:1.2rem;">
            <label for="product-limited" style="margin:0;cursor:pointer;">Limited Batch</label>
          </div>
        </div>

        <div class="form-group mb-4">
          <label for="product-images">Image URLs (comma separated)</label>
          <input type="text" id="product-images" class="form-control" placeholder="https://unsplash.com/..., https://...">
          <small class="text-muted">Paste direct links to images.</small>
        </div>

        <div class="form-group mb-6">
          <label for="product-upload">Or Upload from Device</label>
          <input type="file" id="product-upload" class="form-control" accept="image/*" multiple>
          <small class="text-muted" id="upload-status">Select images to auto-upload. URLs will be appended above.</small>
          <div id="upload-preview" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;"></div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:1rem;">
          <button type="button" class="btn btn--ghost" onclick="closeProductModal()">Cancel</button>
          <button type="submit" class="btn btn--gold">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
