<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Shop AKURE's premium natural products — oils, honey, herbs and more. Sourced from authentic farms." />
  <title>Shop – AKURE</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <link rel="stylesheet" href="./css/global.css?v=1776093859185" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/shop.css" />
  <script src="./js/site-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>

  <div id="page-loader" aria-hidden="true">
    <div class="loader-logo">AKURE</div>
    <div class="loader-bar"></div>
  </div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar__inner">
      <a href="./index.html" class="navbar__logo" style="display:flex; align-items:center;"><img src="./images/logo-bg.png" alt="AKURE" style="height: 48px; width: auto; transform: scale(3.5); transform-origin: left center;" /></a>
      <div class="navbar__links">
        <a href="./index.html">Home</a>
        <a href="./shop.html" class="active">Shop</a>
        <a href="./index.html#farm-section">Our Story</a>
      </div>
      <div class="navbar__actions">
        <a href="./login.html" id="nav-auth-link"
          style="font-size:0.82rem;font-weight:600;letter-spacing:0.04em;">Login</a>
        <a href="./cart.html" class="navbar__cart-btn" aria-label="Cart">🛒<span class="cart-badge">0</span></a>
        <button class="navbar__hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>
  <div class="navbar__mobile">
    <a href="./index.html">Home</a><a href="./shop.html" class="active">Shop</a>
    <a href="./index.html#farm-section">Our Story</a><a href="./login.html">Account</a><a href="./cart.html">🛒 Cart</a>
  </div>

  <main>
    <div class="shop-hero section--sm">
      <div class="container">
        <span class="section-label">All Products</span>
        <h1>Our Collection</h1>
        <p>Premium natural products — pure, potent, handcrafted in small batches.</p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="shop-layout">
          <!-- Sidebar Filters -->
          <aside class="shop-sidebar" aria-label="Filters">
            <div class="shop-sidebar__group">
              <h3 class="shop-sidebar__heading">Search</h3>
              <input type="search" id="search-input" class="form-control" placeholder="Search products…"
                aria-label="Search products" />
            </div>
            <div class="shop-sidebar__group">
              <h3 class="shop-sidebar__heading">Category</h3>
              <div class="filter-options" id="category-filters" role="group" aria-label="Category filters">
                <label class="filter-option">
                  <input type="radio" name="category" value="" checked /> All
                </label>
                <label class="filter-option">
                  <input type="radio" name="category" value="oils" /> Oils
                </label>
                <label class="filter-option">
                  <input type="radio" name="category" value="honey" /> Honey
                </label>
                <label class="filter-option">
                  <input type="radio" name="category" value="herbs" /> Herbs &amp; Spices
                </label>
                <label class="filter-option">
                  <input type="radio" name="category" value="skincare" /> Skincare
                </label>
                <label class="filter-option">
                  <input type="radio" name="category" value="supplements" /> Supplements
                </label>
              </div>
            </div>
            <div class="shop-sidebar__group">
              <h3 class="shop-sidebar__heading">Sort By</h3>
              <select class="form-control" id="sort-select" aria-label="Sort products">
                <option value="newest">Newest First</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
              </select>
            </div>
          </aside>

          <!-- Product Grid -->
          <div class="shop-main">
            <div class="shop-toolbar">
              <p class="shop-count" id="product-count" aria-live="polite">Loading products…</p>
              <button class="btn btn--ghost btn--sm" id="mobile-filter-btn">⊟ Filters</button>
            </div>
            <div id="products-grid" class="product-grid" aria-live="polite" aria-label="Product listing"></div>
            <div id="pagination" class="pagination" aria-label="Pagination"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom" style="border-top:none;padding-top:0;">
        <a href="./index.html" class="footer__logo" style="display:block;"><img src="./images/logo-bg.png" alt="AKURE" style="height: 64px; width: auto; transform: scale(4); transform-origin: bottom center; margin-bottom: 3rem;" /></a>
        <span>© <span id="footer-year">2026</span> AKURE. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <div id="toast-container"></div>
  <script src="./js/utils.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/shop.js"></script>
</body>

</html>
